<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Email + Code Verification</title>
<style>
body { font-family: Arial; display: flex; flex-direction: column; align-items: center; margin-top: 100px; }
input, button { padding: 10px; margin: 5px; font-size: 16px; }
#codeForm { display: none; }
</style>
</head>
<body>

<h2 id="title">Enter your email</h2>

<div id="emailForm">
  <input type="email" id="email" placeholder="you@example.com" required>
  <button onclick="sendEmail()">Send Code</button>
</div>

<div id="codeForm">
  <input type="text" id="code" placeholder="Enter code" required>
  <button onclick="verifyCode()">Verify Code</button>
</div>

<p id="status"></p>

<script>
let userEmail = '';

async function sendEmail() {
    const emailInput = document.getElementById('email').value;
    if (!emailInput) { alert("Enter your email!"); return; }

    userEmail = emailInput;
    document.getElementById('status').innerText = "Sending code...";

    try {
        const res = await fetch('/send-code', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: userEmail })
        });

        const data = await res.json();
        if (data.success) {
            document.getElementById('status').innerText = "Code sent! Check your email.";
            document.getElementById('emailForm').style.display = 'none';
            document.getElementById('codeForm').style.display = 'block';
            document.getElementById('title').innerText = "Enter the code you received";
        } else {
            document.getElementById('status').innerText = "Error: " + data.message;
        }
    } catch (err) {
        document.getElementById('status').innerText = "Network error.";
        console.error(err);
    }
}

async function verifyCode() {
    const codeInput = document.getElementById('code').value;
    if (!codeInput) { alert("Enter your code!"); return; }

    document.getElementById('status').innerText = "Verifying code...";

    try {
        const res = await fetch('/verify-code', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: userEmail, code: codeInput })
        });

        const data = await res.json();
        if (data.success) {
            document.getElementById('status').innerText = "Code verified! Action triggered.";
            // Trigger your bot/webhook action here
        } else {
            document.getElementById('status').innerText = "Invalid code!";
        }
    } catch (err) {
        document.getElementById('status').innerText = "Network error.";
        console.error(err);
    }
}
</script>

</body>
</html>
